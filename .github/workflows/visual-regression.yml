name: Visual Regression

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-regression:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      has_diff: ${{ steps.visual-result.outputs.has_diff }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build repository
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression (prod vs local)
        id: visual
        continue-on-error: true
        env:
          STORYBOOK_PROD_URL: https://trilogy.design/storybook
          VISUAL_MAX_DIFF_RATIO: "0.001"
        run: npm --workspace=@trilogy-ds/storybook run test:visual -- --reporter=html,line

      - name: Compute visual result
        id: visual-result
        run: |
          if find packages/storybook/test-results -type f \( -name '*-diff.png' -o -name '*-failure.png' \) | grep -q .; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload visual report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            packages/storybook/playwright-report
            packages/storybook/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Comment PR when visual diff detected
        if: steps.visual.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              'ЁЯЪиЁЯЪиЁЯЪи Visual regression failed (prod vs local) ЁЯЪиЁЯЪиЁЯЪи',
              '',
              `- 1я╕ПтГг Open run: ${runUrl}`,
              '- 2я╕ПтГг Download artifact: visual-regression-report',
              '- 3я╕ПтГг Review attached images (prod/local/diff) in Playwright report.',
              '',
              'тАЛтЪая╕П Manual approval required to merge this PR.',
              'ЁЯСЙЁЯСЙЁЯСЙ Open the waiting job `visual-regression-approval` and click `Review deployments` to approve ЁЯСИтАЛЁЯСИтАЛЁЯСИтАЛ'
            ].join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })

  visual-regression-approval:
    if: github.event.pull_request.draft == false && needs.visual-regression.outputs.has_diff == 'true'
    needs: [visual-regression]
    runs-on: ubuntu-latest
    environment:
      name: visual-regression-approval
    steps:
      - name: Await manual approval
        run: echo "Visual diffs detected and manually approved."
